# 基座模型
base_model:
  name: null              # 例如 "Qwen/Qwen3.5-27B"，由用户填写或 --suggest 推荐
  trust_remote_code: true

# 训练参数
training:
  method: lora            # lora / qlora / full
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  num_epochs: 3
  learning_rate: 2e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 8192
  early_stopping_patience: 5

# 数据
data:
  source_dir: null        # collect.py 输出目录
  prepare_output: null    # 转换后的训练数据目录
  val_split: 0.1          # 验证集比例
  min_samples: 50         # 最少训练样本数

# 路径
paths:
  output_dir: null        # 训练输出/checkpoint
  data_dir: ~/.cache/self-trainer/data
